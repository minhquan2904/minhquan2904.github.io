site_name: quanbm
site_url: http://localhost:8000/
repo_url: https://github.com/minhquan2904/minhquan2904.github.io

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.jpg
  favicon: assets/favicon.jpg
  features:
    - search.suggest
    - navigation.indexes
    - navigation.insants
    - navigation.footer
    - announce.dismiss

plugins:
  - search
  - awesome-pages

extra:
  social:
    - icon: fontawesome/brands/mastodon
      link: https://fosstodon.org/@squidfunk
  version:
    provider: quanbm

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="detech()">Click me!</button>
    <script type="text/javascript">
        function detech()
        {
            var uagent = navigator.userAgent.toLowerCase();
            if (uagent.search("Android") > -1)
                alert('Android device');
            if (uagent.search("iphone") > -1)
                alert('iphone device');
            if (uagent.search("iPod") > -1)
                alert('iPad device');
            if (uagent.search("iPad") > -1)
                alert('iPad device');

            if (uagent.search("webOS") > -1)
                alert('webOS device');
            if (uagent.search("BlackBerry") > -1)
                alert('BlackBerry device');
            if (uagent.search("BB") > -1)
                alert('BB device');
            if (uagent.search("PlayBook") > -1)
                alert('PlayBook device');
            if (uagent.search("IEMobile") > -1)
                alert('IEMobile device');
            if (uagent.search("Kindle") > -1)
                alert('Kindle device');
            if (uagent.search("Silk") > -1)
                alert('Silk device');
            if (uagent.search("Opera Mini") > -1)
                alert('Opera Mini device');
        }
    </script>
</body>
</html>
